---
- name: install httpd
  yum:
    name: "{{ httpd_service_name }}"
    state: present

- name: copy the file index.html
  copy:
    src: /home/ansible/index.html
    dest: /var/www/html/index.html

- name: start httpd
  service:
    name: "{{ httpd_service_name }}"
    state: started
    enabled: true