---
- hosts: all
  become: true
  tasks:
    - name: istall httpd
      yum:
        name: httpd
        state: present
  
    - name: copy the file index.html
      copy:
        src: /home/ansibleindex.html
        dest: /var/www/html/index.html

    - name: start httpd   
      service:
        name: httpd
        state: started
        enabled: true