---
- hosts: all
  become: true
  vars: 
    apps: [nginx,httpd,mariadb]
  tasks:
    - name: install apps
      yum:
        name: "{{ item }}"
        state: present
      loop: "{{ apps }}"

    - name: enable services
      service:
        name: "{{ item }}"
        state: started
        enabled: true
      loop: "{{ apps }}"