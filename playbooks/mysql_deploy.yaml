---
- name: Install and configure MySQL
  hosts: all
  become: yes

  vars_files:
    - vars/mysql.yml

  tasks:
    - name: Install MySQL server
      apt:
        name: mysql-server
        state: present
      when: ansible_os_family == "Debian"

    - name: Install MySQL server (RHEL/CentOS)
      dnf:
        name: mysql-server
        state: present
      when: ansible_os_family == "RedHat"

    - name: Deploy MySQL configuration
      template:
        src: my.cnf.j2
        dest: /etc/mysql/my.cnf
      notify:
        - restart mysql

  handlers:
    - name: restart mysql
      service:
        name: mysql
        state: restarted
